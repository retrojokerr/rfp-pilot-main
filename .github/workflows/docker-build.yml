name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  OWNER: retrojokerr

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./rfp-backend
          push: true
          tags: |
            ghcr.io/retrojokerr/rfp-pilot-backend:latest
            ghcr.io/retrojokerr/rfp-pilot-backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./rfp-frontend
          push: true
          tags: |
            ghcr.io/retrojokerr/rfp-pilot-frontend:latest
            ghcr.io/retrojokerr/rfp-pilot-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}